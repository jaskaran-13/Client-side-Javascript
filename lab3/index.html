<!--
STEP 1: Created html structure for toy car
-->

<!DOCTYPE html>
<html lang="en">

<head>
     <!-- STEP 2:  page setup -->
    <meta charset="UTF-8">
    <title>Model Toy Cars</title>

    <!-- STEP 3: Linked CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- STEP 4: added  page heading -->
<h1>The Model Toy Cars Store</h1>
<!-- STEP 5: added container that hold toy car information -->
<div class="container">

    <div class="card">
        <!-- STEP 6: display properties of car -->
        <h2 id="name"></h2>

        

        <p><b>Brand:</b> <span id="brand"></span></p>
        <p><b>Color:</b> <span id="color"></span></p>
        <p><b>Scale:</b> <span id="scale"></span></p>
        <p><b>Material:</b> <span id="material"></span></p>
        <p><b>Price:</b> $<span id="price"></span></p>
        <p><b>Year:</b> <span id="year"></span></p>
        <p><b>Stock:</b> <span id="stock"></span></p>
        <!-- STEP 7:added buttons-->
        <button onclick="changeColor()">Change Color</button>
        <button onclick="discount()">Apply Discount</button>

    </div>

</div>
<!-- STEP 8: Link JavaScript file -->
<script src="script.js"></script>

</body>
</html>
